<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNA NaTI · Sistema de Gestão de Ativos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --red: #c8102e;
    --red-dark: #a00d25;
    --red-light: #ff2d4e;
    --blue: #0066ff;
    --blue-dark: #0052cc;
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #222230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #9090a8;
    --text3: #6060758;
    --green: #00e676;
    --orange: #ff9800;
    --yellow: #ffd600;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; overflow-x:hidden; }
  
  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg2); }
  ::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

  /* ============ LOGIN ============ */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 20% 50%, rgba(200,16,46,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,102,255,0.1) 0%, transparent 60%),
                var(--bg);
  }
  .login-box {
    width:420px; background:var(--bg2); border:1px solid var(--border2); border-radius:20px;
    padding:48px; box-shadow:var(--shadow-lg);
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .login-logo { text-align:center; margin-bottom:40px; }
  .login-logo .brand { font-size:13px; color:var(--text2); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px; }
  .login-logo h1 { font-size:36px; font-weight:700; letter-spacing:-1px; }
  .login-logo h1 span { color:var(--red); }
  .login-logo p { color:var(--text2); font-size:14px; margin-top:8px; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; font-size:12px; color:var(--text2); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; font-weight:500; }
  .form-group input {
    width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:14px 16px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:15px;
    outline:none; transition:border 0.2s;
  }
  .form-group input:focus { border-color:var(--red); }
  .btn-primary {
    width:100%; background:var(--red); border:none; border-radius:var(--radius-sm);
    padding:14px; color:#fff; font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600;
    cursor:pointer; transition:all 0.2s; letter-spacing:0.02em;
  }
  .btn-primary:hover { background:var(--red-light); transform:translateY(-1px); box-shadow:0 4px 16px rgba(200,16,46,0.4); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .login-error { background:rgba(200,16,46,0.15); border:1px solid rgba(200,16,46,0.3); border-radius:var(--radius-sm); padding:12px 16px; font-size:14px; color:#ff6b8a; margin-bottom:20px; display:none; }

  /* ============ APP LAYOUT ============ */
  #app { display:none; min-height:100vh; }
  
  /* SIDEBAR */
  .sidebar {
    position:fixed; left:0; top:0; bottom:0; width:240px;
    background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column; z-index:100;
    transition: transform 0.3s;
  }
  .sidebar-logo { padding:24px 24px 20px; border-bottom:1px solid var(--border); }
  .sidebar-logo .brand { font-size:10px; color:var(--text2); letter-spacing:0.2em; text-transform:uppercase; }
  .sidebar-logo h2 { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
  .sidebar-logo h2 span { color:var(--red); }
  .sidebar-user { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .user-avatar { width:36px; height:36px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-role { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.08em; }
  .sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
  .nav-section { padding:8px 20px 4px; font-size:10px; color:var(--text2); letter-spacing:0.15em; text-transform:uppercase; font-weight:600; }
  .nav-item {
    display:flex; align-items:center; gap:12px; padding:10px 20px; cursor:pointer;
    transition:all 0.15s; color:var(--text2); font-size:14px; font-weight:500;
    border-left:3px solid transparent; margin:1px 0;
  }
  .nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .nav-item.active { background:rgba(200,16,46,0.1); color:var(--red); border-left-color:var(--red); }
  .nav-item .icon { font-size:18px; }
  .sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
  .btn-logout { width:100%; background:transparent; border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; color:var(--text2); font-family:'Space Grotesk',sans-serif; font-size:13px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:8px; justify-content:center; }
  .btn-logout:hover { border-color:var(--red); color:var(--red); }

  /* MAIN CONTENT */
  .main { margin-left:240px; min-height:100vh; display:flex; flex-direction:column; }
  .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .topbar-title { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
  .topbar-actions { display:flex; gap:10px; align-items:center; }
  .content { padding:32px; flex:1; }

  /* CARDS */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px; transition:all 0.2s; }
  .stat-card:hover { border-color:var(--border2); transform:translateY(-2px); }
  .stat-card .label { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
  .stat-card .value { font-size:32px; font-weight:700; letter-spacing:-1px; font-family:'JetBrains Mono',monospace; }
  .stat-card .sub { font-size:12px; color:var(--text2); margin-top:4px; }
  .stat-card.red .value { color:var(--red); }
  .stat-card.green .value { color:var(--green); }
  .stat-card.blue .value { color:var(--blue); }
  .stat-card.orange .value { color:var(--orange); }

  /* TABLES */
  .table-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:24px; }
  .table-header { padding:20px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .table-title { font-size:15px; font-weight:600; }
  .table-actions { display:flex; gap:8px; }
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { padding:10px 16px; text-align:left; color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:0.1em; font-weight:600; background:var(--bg3); border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:rgba(255,255,255,0.03); }
  tbody td { padding:12px 16px; vertical-align:middle; }
  .td-mono { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:0.05em; }
  .badge::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
  .badge-green { background:rgba(0,230,118,0.12); color:var(--green); }
  .badge-red { background:rgba(200,16,46,0.15); color:#ff6b8a; }
  .badge-orange { background:rgba(255,152,0,0.12); color:var(--orange); }
  .badge-gray { background:rgba(255,255,255,0.07); color:var(--text2); }
  .badge-blue { background:rgba(0,102,255,0.12); color:#6699ff; }

  /* BUTTONS */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-sm); font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; border:none; white-space:nowrap; }
  .btn-sm { padding:6px 12px; font-size:12px; }
  .btn-red { background:var(--red); color:#fff; }
  .btn-red:hover { background:var(--red-light); }
  .btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--border2); color:var(--text); }
  .btn-blue { background:var(--blue); color:#fff; }
  .btn-blue:hover { background:var(--blue-dark); }
  .btn-green { background:rgba(0,230,118,0.15); color:var(--green); border:1px solid rgba(0,230,118,0.2); }
  .btn-green:hover { background:rgba(0,230,118,0.25); }

  /* SEARCH */
  .search-bar { position:relative; }
  .search-bar input { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px 9px 36px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:13px; outline:none; width:240px; transition:border 0.2s; }
  .search-bar input:focus { border-color:var(--border2); }
  .search-bar::before { content:'🔍'; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:13px; pointer-events:none; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:16px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:fadeUp 0.25s ease; }
  .modal-header { padding:24px 28px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--bg2); z-index:1; }
  .modal-title { font-size:18px; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--text2); font-size:22px; cursor:pointer; line-height:1; padding:4px; border-radius:6px; }
  .modal-close:hover { color:var(--text); background:rgba(255,255,255,0.06); }
  .modal-body { padding:24px 28px; }
  .modal-footer { padding:16px 28px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-field { margin-bottom:16px; }
  .form-field label { display:block; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; font-weight:600; }
  .form-field input, .form-field select, .form-field textarea {
    width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 14px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:14px; outline:none; transition:border 0.2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color:var(--red); }
  .form-field select option { background:var(--bg3); }
  .form-field textarea { resize:vertical; min-height:80px; }
  .form-full { grid-column:1/-1; }

  /* LOADING */
  .loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--text2); gap:12px; font-size:14px; }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; padding:60px; color:var(--text2); font-size:14px; }
  .empty .icon { font-size:48px; margin-bottom:12px; opacity:0.4; }

  /* TOAST */
  #toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  .toast { background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:14px 20px; font-size:13px; display:flex; align-items:center; gap:10px; box-shadow:var(--shadow); animation:slideIn 0.3s ease; max-width:320px; pointer-events:all; }
  .toast.success { border-left:3px solid var(--green); }
  .toast.error { border-left:3px solid var(--red); }
  .toast.info { border-left:3px solid var(--blue); }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

  /* REALTIME DOT */
  .realtime-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; display:inline-block; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* DETAIL PANEL */
  .detail-panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:24px; }
  .detail-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-top:16px; }
  .detail-item .di-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px; }
  .detail-item .di-value { font-size:14px; font-weight:500; }

  /* PREDIO TAG */
  .predio-tag { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:0.05em; }

  /* SECTION HEADER */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .section-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .section-sub { font-size:14px; color:var(--text2); margin-top:2px; }

  /* TABS */
  .tabs { display:flex; gap:4px; background:var(--bg3); border-radius:var(--radius-sm); padding:4px; margin-bottom:24px; width:fit-content; }
  .tab { padding:8px 20px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; color:var(--text2); }
  .tab.active { background:var(--bg2); color:var(--text); box-shadow:var(--shadow); }

  /* QR MODAL */
  #qr-canvas { display:flex; justify-content:center; margin:20px 0; }
  #qr-canvas > div { background:#fff; padding:16px; border-radius:8px; }

  /* FILTER BAR */
  .filter-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
  .filter-bar select { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:13px; outline:none; }
  .filter-bar select:focus { border-color:var(--border2); }

  /* BREADCRUMB */
  .breadcrumb { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text2); margin-bottom:24px; }
  .breadcrumb span { cursor:pointer; }
  .breadcrumb span:hover { color:var(--text); }
  .breadcrumb .sep { opacity:0.4; }
  .breadcrumb .current { color:var(--text); font-weight:500; }

  /* RESPONSIVO */
  @media (max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .main { margin-left:0; }
    .stat-grid { grid-template-columns:1fr 1fr; }
    .form-row { grid-template-columns:1fr; }
    .content { padding:16px; }
  }

  /* PROGRESS BAR */
  .progress-bar { height:4px; background:var(--bg4); border-radius:2px; overflow:hidden; margin-top:6px; }
  .progress-fill { height:100%; border-radius:2px; transition:width 0.5s; }
  .pf-green { background:var(--green); }
  .pf-orange { background:var(--orange); }
  .pf-red { background:var(--red); }

  /* ACTIONS CELL */
  .actions-cell { display:flex; gap:6px; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:80px 40px; color:var(--text2); }
  .empty-state .es-icon { font-size:64px; opacity:0.2; margin-bottom:20px; }
  .empty-state h3 { font-size:18px; font-weight:600; color:var(--text); margin-bottom:8px; }
  .empty-state p { font-size:14px; }

  /* HIGHLIGHT on realtime update */
  .row-updated { animation:highlightRow 1.5s ease; }
  @keyframes highlightRow { 0%{background:rgba(0,230,118,0.1);} 100%{background:transparent;} }

  /* ============ DASHBOARD LIGHT THEME ============ */
  .dash-wrap { background:#f4f4f0; border-radius:var(--radius); padding:28px; margin:-8px; }
  .dash-kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .dash-kpi {
    background:#fff; border-radius:12px; padding:22px 24px;
    border-top:4px solid #e0e0e0;
    box-shadow:0 1px 4px rgba(0,0,0,0.07);
    position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .dash-kpi:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.12); }
  .dash-kpi.kpi-total  { border-top-color:#555; }
  .dash-kpi.kpi-green  { border-top-color:#2ecc71; }
  .dash-kpi.kpi-orange { border-top-color:#e67e22; }
  .dash-kpi.kpi-red    { border-top-color:#c8102e; }
  .dash-kpi.kpi-gray   { border-top-color:#aaa; }
  .dash-kpi .kpi-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin-bottom:6px; }
  .dash-kpi .kpi-value { font-size:36px; font-weight:700; letter-spacing:-1px; color:#1a1a1a; font-family:'JetBrains Mono',monospace; line-height:1; }
  .dash-kpi.kpi-total  .kpi-value { color:#333; }
  .dash-kpi.kpi-green  .kpi-value { color:#27ae60; }
  .dash-kpi.kpi-orange .kpi-value { color:#e67e22; }
  .dash-kpi.kpi-red    .kpi-value { color:#c8102e; }
  .dash-kpi.kpi-gray   .kpi-value { color:#777; }
  .dash-kpi .kpi-sub { font-size:11px; color:#aaa; margin-top:6px; }
  .dash-kpi .kpi-bar { height:3px; background:#f0f0f0; border-radius:2px; margin-top:10px; overflow:hidden; }
  .dash-kpi .kpi-bar-fill { height:100%; border-radius:2px; transition:width 1s ease; }
  @keyframes countUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .kpi-value { animation: countUp 0.5s ease; }
  .dash-charts { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .dash-chart-full { grid-column:1/-1; }
  .dash-chart-box {
    background:#fff; border-radius:12px; padding:22px 24px;
    box-shadow:0 1px 4px rgba(0,0,0,0.07);
  }
  .dash-chart-box .chart-title { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin-bottom:16px; }
  .dash-chart-box canvas { max-height:220px; }
  .dash-chart-full canvas { max-height:180px; }
  @media (max-width:768px) { .dash-charts { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">Una · Sistema de Gestão</div>
      <h1>Na<span>TI</span></h1>
      <p>Gestão de Ativos de TI</p>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="form-group">
      <label>E-mail institucional</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">Una · NaTI</div>
      <h2>Na<span>TI</span></h2>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">U</div>

let _dashCharts = [];

function animateCounter(el, target, duration=900) {
  const start = performance.now();
  const update = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * target);
    if (p < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

async function renderDashboard() {
  setLoading();

  // Destroy previous charts
  _dashCharts.forEach(c => c.destroy());
  _dashCharts = [];

  const [{ data: predios }, { data: labs }, { data: equip }, { data: manutAll }] = await Promise.all([
    db.from('predios').select('*'),
    db.from('laboratorios').select('*'),
    db.from('equipamentos').select('*'),
    db.from('manutencoes').select('*').order('aberto_em', { ascending: true })
  ]);

  const manut = (manutAll||[]).filter(m => m.status !== 'resolvido');

  const total_equip = equip?.length || 0;
  const op         = equip?.filter(e => e.status==='operacional').length || 0;
  const em_manut   = equip?.filter(e => e.status==='manutencao').length  || 0;
  const inativos   = equip?.filter(e => e.status==='inativo').length     || 0;
  const extraviado = equip?.filter(e => e.status==='extraviado').length  || 0;
  const labs_ativos = labs?.filter(l => l.ativo).length || 0;
  const pendentes  = manut?.length || 0;
  const pct = total_equip ? Math.round(op/total_equip*100) : 0;

  // ── equipamentos por tipo ──
  const tipoCount = {};
  (equip||[]).forEach(e => { tipoCount[e.tipo] = (tipoCount[e.tipo]||0)+1; });
  const tipoLabels = Object.keys(tipoCount).sort((a,b)=>tipoCount[b]-tipoCount[a]);
  const tipoVals   = tipoLabels.map(k=>tipoCount[k]);

  // ── manutenções por mês (últimos 6 meses) ──
  const now = new Date();
  const monthLabels = [];
  const monthVals   = [];
  for (let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    monthLabels.push(d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}));
    monthVals.push((manutAll||[]).filter(m => {
      const md = new Date(m.aberto_em);
      return md.getFullYear()===d.getFullYear() && md.getMonth()===d.getMonth();
    }).length);
  }

  setContent(`
    <div class="dash-wrap">
      <!-- KPI Cards -->
      <div class="dash-kpi-grid">
        <div class="dash-kpi kpi-total">
          <div class="kpi-label">Total Equipamentos</div>
          <div class="kpi-value" id="kpi-total">0</div>
          <div class="kpi-sub">${labs_ativos} labs · ${(predios||[]).length} prédios</div>
        </div>
        <div class="dash-kpi kpi-green">
          <div class="kpi-label">Operacionais</div>
          <div class="kpi-value" id="kpi-op">0</div>
          <div class="kpi-sub">${pct}% do total</div>
          <div class="kpi-bar"><div class="kpi-bar-fill" id="kpi-bar" style="width:0%;background:#2ecc71"></div></div>
        </div>
        <div class="dash-kpi kpi-orange">
          <div class="kpi-label">Em Manutenção</div>
          <div class="kpi-value" id="kpi-manut">0</div>
          <div class="kpi-sub">chamados abertos</div>
        </div>
        <div class="dash-kpi kpi-red">
          <div class="kpi-label">Inativos</div>
          <div class="kpi-value" id="kpi-inativo">0</div>
          <div class="kpi-sub">Aguardando descarte/reparo</div>
        </div>
        <div class="dash-kpi kpi-gray">
          <div class="kpi-label">Pendentes</div>
          <div class="kpi-value" id="kpi-pendentes">0</div>
          <div class="kpi-sub">chamados em aberto</div>
        </div>
      </div>

      <!-- Charts row 1 -->
      <div class="dash-charts">
        <div class="dash-chart-box">
          <div class="chart-title">Status dos Equipamentos</div>
          <canvas id="chart-rosca"></canvas>
        </div>
        <div class="dash-chart-box">
          <div class="chart-title">Equipamentos por Tipo</div>
          <canvas id="chart-barras"></canvas>
        </div>
      </div>

      <!-- Chart row 2 - full width -->
      <div class="dash-charts">
        <div class="dash-chart-box dash-chart-full">
          <div class="chart-title">Manutenções Abertas por Mês</div>
          <canvas id="chart-linha"></canvas>
        </div>
      </div>
    </div>
  `);

  // Animate counters
  setTimeout(() => {
    animateCounter(document.getElementById('kpi-total'),     total_equip);
    animateCounter(document.getElementById('kpi-op'),        op);
    animateCounter(document.getElementById('kpi-manut'),     em_manut);
    animateCounter(document.getElementById('kpi-inativo'),   inativos);
    animateCounter(document.getElementById('kpi-pendentes'), pendentes);
    // bar
    setTimeout(() => {
      const bar = document.getElementById('kpi-bar');
      if (bar) bar.style.width = pct + '%';
    }, 100);
  }, 50);

  // Chart defaults
  Chart.defaults.font.family = "'Space Grotesk', sans-serif";
  Chart.defaults.color = '#888';

  // Rosca
  const ctxR = document.getElementById('chart-rosca')?.getContext('2d');
  if (ctxR) {
    _dashCharts.push(new Chart(ctxR, {
      type: 'doughnut',
      data: {
        labels: ['Operacional', 'Manutenção', 'Inativo', 'Extraviado'],
        datasets: [{
          data: [op, em_manut, inativos, extraviado],
          backgroundColor: ['#2ecc71','#e67e22','#c8102e','#95a5a6'],
          borderWidth: 3, borderColor: '#fff',
          hoverOffset: 8
        }]
      },
      options: {
        cutout: '62%',
        plugins: {
          legend: { position:'bottom', labels:{ boxWidth:10, padding:16, font:{size:12} } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} (${total_equip?Math.round(ctx.raw/total_equip*100):0}%)` } }
        },
        animation: { animateRotate:true, duration:900 }
      }
    }));
  }

  // Barras
  const ctxB = document.getElementById('chart-barras')?.getContext('2d');
  if (ctxB) {
    _dashCharts.push(new Chart(ctxB, {
      type: 'bar',
      data: {
        labels: tipoLabels,
        datasets: [{
          label: 'Qtd',
          data: tipoVals,
          backgroundColor: '#c8102e',
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend:{ display:false } },
        scales: {
          x: { grid:{ color:'#f0f0f0' }, ticks:{ stepSize:1 } },
          y: { grid:{ display:false }, ticks:{ font:{size:11} } }
        },
        animation: { duration:900 }
      }
    }));
  }

  // Linha
  const ctxL = document.getElementById('chart-linha')?.getContext('2d');
  if (ctxL) {
    _dashCharts.push(new Chart(ctxL, {
      type: 'line',
      data: {
        labels: monthLabels,
        datasets: [{
          label: 'Manutenções',
          data: monthVals,
          borderColor: '#c8102e',
          backgroundColor: 'rgba(200,16,46,0.08)',
          tension: 0.4, fill: true,
          pointBackgroundColor: '#c8102e',
          pointRadius: 5, pointHoverRadius: 7
        }]
      },
      options: {
        plugins: { legend:{ display:false } },
        scales: {
          x: { grid:{ display:false } },
          y: { grid:{ color:'#f0f0f0' }, ticks:{ stepSize:1 }, beginAtZero:true }
        },
        animation: { duration:900 }
      }
    }));
  }
}

async function saveLab() {

function renderEquipTable(data, labOpts='', predioOpts='') {
  const content = document.getElementById('page-content');

    return `

        <td><strong>${e.tipo}</strong></td>
        <td>${e.marca||'—'} ${e.modelo||''}</td>

        </td>
      </tr>`;
  }).join('');

  const filterHtml = `
    <div class="filter-bar">
      <div class="search-bar"><input id="equip-search" placeholder="Buscar..." oninput="filterEquip()"/></div>
      <select id="equip-status-filter" onchange="filterEquip()">
        <option value="">Todos os status</option>
        <option value="operacional">Operacional</option>
        <option value="manutencao">Manutenção</option>
        <option value="inativo">Inativo</option>
        <option value="extraviado">Extraviado</option>
      </select>
      <select id="equip-tipo-filter" onchange="filterEquip()">
        <option value="">Todos os tipos</option>
        ${['computador','notebook','chromebook','monitor','projetor','amplificador','microfone','switch','roteador','nobreak','impressora','outro'].map(t=>`<option value="${t}">${t}</option>`).join('')}

      <div class="table-wrap"><table>
        <thead><tr><th>Tipo</th><th>Marca/Modelo</th><th>Patrimônio</th><th>Série</th><th>Lab</th><th>Prédio</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="equip-tbody">${rows||'<tr><td colspan="8"><div class="empty">Nenhum equipamento.</div></td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function filterEquip() {
  const q = document.getElementById('equip-search')?.value.toLowerCase()||'';
  const st = document.getElementById('equip-status-filter')?.value||'';
  const tp = document.getElementById('equip-tipo-filter')?.value||'';
  const filtered = equipData.filter(e => {
    const txt = `${e.tipo} ${e.marca||''} ${e.modelo||''} ${e.patrimonio||''} ${e.numero_serie||''}`.toLowerCase();
    return (!q||txt.includes(q)) && (!st||e.status===st) && (!tp||e.tipo===tp);
  });
  const rows = filtered.map(e => {
    const lab = e.laboratorios; const predio = lab?.predios;
    return `<tr id="equip-${e.id}"><td><strong>${e.tipo}</strong></td><td>${e.marca||'—'} ${e.modelo||''}</td><td class="td-mono">${e.patrimonio||'—'}</td><td class="td-mono">${e.numero_serie||'—'}</td><td>${lab?`${lab.numero} · ${lab.nome}`:'—'}</td><td>${predio?predioBadge(predio.nome,predio.cor):'—'}</td><td>${statusBadge(e.status)}</td><td class="actions-cell"><button class="btn btn-ghost btn-sm" onclick="showQR('${e.id}','${e.patrimonio||e.id}')">QR</button>${canEdit()?`<button class="btn btn-ghost btn-sm" onclick="modalEditEquip('${e.id}')">✏️</button><button class="btn btn-ghost btn-sm" onclick="modalNovaManut('${e.id}')">🔧</button>`:''}</td></tr>`;
  }).join('');
  const tbody = document.getElementById('equip-tbody');
  if (tbody) tbody.innerHTML = rows || '<tr><td colspan="8"><div class="empty">Nenhum resultado.</div></td></tr>';
}

        <td>${e?.laboratorios?`${e.laboratorios.numero} · ${e.laboratorios.nome}`:'—'}</td>
        <td>${manutBadge(m.status)}</td>
        <td>${prioridadeBadge(m.prioridade)}</td>
        <td class="td-mono">${new Date(m.aberto_em).toLocaleDateString('pt-BR')}</td>
        <td>${m.resolvido_em?`<span style="font-size:11px;color:var(--green)">✓ ${new Date(m.resolvido_em).toLocaleDateString('pt-BR')}</span>`:'—'}</td>
        ${canEdit()?`<td><button class="btn btn-ghost btn-sm" onclick="modalEditManut('${m.id}')">✏️</button></td>`:'<td></td>'}
      </tr>`;
  }).join('');

  const content = document.getElementById('page-content');
  const abertos = data.filter(m=>m.status!=='resolvido').length;
  content.innerHTML = `
    <div class="section-header"><div><div class="section-title">Manutenções</div><div class="section-sub">${abertos} chamados abertos · ${data.length} total</div></div></div>
    <div class="filter-bar">
      <div class="search-bar"><input id="manut-search" placeholder="Buscar..." oninput="filterManut()"/></div>
      <select id="manut-status-filter" onchange="filterManut()">
        <option value="">Todos</option>
        <option value="aberto">Aberto</option>
        <option value="em_andamento">Em Andamento</option>
        <option value="resolvido">Resolvido</option>
      </select>
      <select id="manut-prio-filter" onchange="filterManut()">
        <option value="">Prioridades</option>
        <option value="critica">Crítica</option>
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
      </select>
    </div>
    <div class="table-card">
      <div class="table-wrap"><table>
        <thead><tr><th>Título</th><th>Equipamento</th><th>Lab</th><th>Status</th><th>Prioridade</th><th>Aberto</th><th>Resolvido</th><th></th></tr></thead>
        <tbody id="manut-tbody">${rows||'<tr><td colspan="8"><div class="empty">Nenhum chamado.</div></td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function filterManut() {
  const q = document.getElementById('manut-search')?.value.toLowerCase()||'';
  const st = document.getElementById('manut-status-filter')?.value||'';
  const pr = document.getElementById('manut-prio-filter')?.value||'';
  const filtered = manutData.filter(m => {
    const txt = `${m.titulo} ${m.descricao||''}`.toLowerCase();
    return (!q||txt.includes(q)) && (!st||m.status===st) && (!pr||m.prioridade===pr);
  });
  const rows = filtered.map(m => {
    const e = m.equipamentos;
    return `<tr><td><strong>${m.titulo}</strong></td><td>${e?`${e.tipo} · ${e.marca||''} ${e.modelo||''}`:'—'}</td><td>${e?.laboratorios?`${e.laboratorios.numero} · ${e.laboratorios.nome}`:'—'}</td><td>${manutBadge(m.status)}</td><td>${prioridadeBadge(m.prioridade)}</td><td class="td-mono">${new Date(m.aberto_em).toLocaleDateString('pt-BR')}</td><td>${m.resolvido_em?`<span style="font-size:11px;color:var(--green)">✓ ${new Date(m.resolvido_em).toLocaleDateString('pt-BR')}</span>`:'—'}</td>${canEdit()?`<td><button class="btn btn-ghost btn-sm" onclick="modalEditManut('${m.id}')">✏️</button></td>`:'<td></td>'}</tr>`;
  }).join('');
  const tbody = document.getElementById('manut-tbody');
  if (tbody) tbody.innerHTML = rows || '<tr><td colspan="8"><div class="empty">Sem resultados.</div></td></tr>';
}

async function refreshManutencoes() {
  const { data: manut } = await db.from('manutencoes').select(`*, equipamentos(tipo, marca, modelo, patrimonio, laboratorio_id, laboratorios(numero, nome))`).order('aberto_em', { ascending:false });
  manutData = manut || [];
  filterManut();
}

async function saveManut(equipId) {
  const titulo = document.getElementById('nm-titulo').value.trim();
  if (!titulo) { toast('Título obrigatório', 'error'); return; }
  const { error } = await db.from('manutencoes').insert({
    equipamento_id: equipId, titulo,
    descricao: document.getElementById('nm-desc').value||null,
    prioridade: document.getElementById('nm-prio').value,
    status: document.getElementById('nm-status').value,
    responsavel_id: currentUser.id
  });
  if (error) { toast(error.message, 'error'); return; }
  toast('Chamado aberto!'); closeModal();
  if (currentPage==='manutencoes') renderManutencoes();
  if (currentPage==='equipamentos') toast('Chamado aberto com sucesso!');
}

async function saveManutLivre() {
  const equipId = document.getElementById('nm-equip').value;
  const titulo = document.getElementById('nm-titulo').value.trim();
  if (!equipId||!titulo) { toast('Preencha equipamento e título', 'error'); return; }
  const { error } = await db.from('manutencoes').insert({
    equipamento_id: equipId, titulo,
    descricao: document.getElementById('nm-desc').value||null,
    prioridade: document.getElementById('nm-prio').value,
    status: document.getElementById('nm-status').value,
    responsavel_id: currentUser.id
  });
  if (error) { toast(error.message, 'error'); return; }
  toast('Chamado aberto!'); closeModal(); renderManutencoes();
}

async function modalEditManut(id) {
  const { data: m } = await db.from('manutencoes').select('*').eq('id', id).single();
  openModal('Editar Chamado', `
    <div class="form-field"><label>Título</label><input id="em-titulo" value="${m.titulo}"/></div>
    <div class="form-field"><label>Descrição</label><textarea id="em-desc">${m.descricao||''}</textarea></div>
    <div class="form-row">
      <div class="form-field"><label>Prioridade</label><select id="em-prio">
        ${['baixa','media','alta','critica'].map(p=>`<option value="${p}" ${p===m.prioridade?'selected':''}>${p}</option>`).join('')}
      </select></div>
      <div class="form-field"><label>Status</label><select id="em-status">
        ${['aberto','em_andamento','resolvido'].map(s=>`<option value="${s}" ${s===m.status?'selected':''}>${s}</option>`).join('')}

async function updateManut(id) {
  const status = document.getElementById('em-status').value;
  const { error } = await db.from('manutencoes').update({
    titulo: document.getElementById('em-titulo').value,
    descricao: document.getElementById('em-desc').value||null,
    prioridade: document.getElementById('em-prio').value,
    status,
    resolvido_em: status==='resolvido' ? new Date().toISOString() : null
  }).eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  toast('Chamado atualizado!'); closeModal(); renderManutencoes();
}

async function saveSw() {
  const nome = document.getElementById('ns-nome').value.trim();

  if (error) { toast(error.message, 'error'); return; }
  toast('Software cadastrado!'); closeModal(); renderSoftwares();
}

async function deleteSw(id) {
  if (!confirm('Excluir este software?')) return;
  await db.from('softwares').delete().eq('id', id);
  toast('Removido!', 'info'); renderSoftwares();
}

async function saveUser() {
  const nome = document.getElementById('nu-nome').value.trim();
  const email = document.getElementById('nu-email').value.trim();
  const role = document.getElementById('nu-role').value;
  if (!nome||!email) { toast('Preencha nome e e-mail', 'error'); return; }
  // Invite user via Supabase
  const { data, error } = await db.auth.admin?.inviteUserByEmail
    ? db.auth.admin.inviteUserByEmail(email)
    : { error: null };
  // Create profile record - admin would need to create via edge function in production
  // For now we insert profile assuming user will be created
  toast('Para convidar usuários via e-mail, use o painel Supabase → Authentication → Users', 'info');
  closeModal();

async function modalEditUser(id) {
  const { data: p } = await db.from('perfis').select('*').eq('id', id).single();
  openModal('Editar Usuário', `
    <div class="form-field"><label>Nome</label><input id="eu-nome" value="${p.nome}"/></div>
    <div class="form-field"><label>Perfil</label><select id="eu-role">
      ${['visualizador','tecnico','admin'].map(r=>`<option value="${r}" ${r===p.role?'selected':''}>${r}</option>`).join('')}

    <div class="form-field"><label>Ativo</label><select id="eu-ativo">

  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-red" onclick="updateUser('${id}')">Salvar</button>`);
}

async function updateUser(id) {
  const { error } = await db.from('perfis').update({
    nome: document.getElementById('eu-nome').value,
    role: document.getElementById('eu-role').value,
    ativo: document.getElementById('eu-ativo').value === 'true'
  }).eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  toast('Usuário atualizado!'); closeModal(); renderUsuarios();
}

async function renderRelatorios() {
  setLoading();
  const [{ data: equips }, { data: manut }, { data: labs }] = await Promise.all([
    db.from('equipamentos').select(`*, laboratorios(nome, numero, predios:predio_id(nome))`),
    db.from('manutencoes').select(`*, equipamentos(tipo, marca, modelo, patrimonio)`),
    db.from('vw_lab_resumo').select('*')
  ]);

  const byStatus = {};
  (equips||[]).forEach(e => { byStatus[e.status] = (byStatus[e.status]||0)+1; });
  const byTipo = {};
  (equips||[]).forEach(e => { byTipo[e.tipo] = (byTipo[e.tipo]||0)+1; });
  const manutPend = (manut||[]).filter(m=>m.status!=='resolvido').length;
  const manutRes = (manut||[]).filter(m=>m.status==='resolvido').length;

  const statusRows = Object.entries(byStatus).map(([k,v])=>`<tr><td>${k}</td><td class="td-mono">${v}</td><td>${Math.round(v/(equips?.length||1)*100)}%</td></tr>`).join('');
  const tipoRows = Object.entries(byTipo).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${k}</td><td class="td-mono">${v}</td></tr>`).join('');

  setContent(`
    <div class="section-header">
      <div><div class="section-title">Relatórios</div><div class="section-sub">Visão analítica do inventário</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="exportCSV(${JSON.stringify(JSON.stringify(equips||[]))}.split('').map(()=>({})),'equip.csv')" onclick="exportCSV(equipData||[],'equipamentos.csv')">⬇ Equip. CSV</button>
      </div>
    </div>
    <div class="stat-grid" style="margin-bottom:24px">
      <div class="stat-card blue"><div class="label">Total Equip.</div><div class="value">${equips?.length||0}</div></div>
      <div class="stat-card green"><div class="label">Operacionais</div><div class="value">${byStatus['operacional']||0}</div></div>
      <div class="stat-card orange"><div class="label">Chamados Abertos</div><div class="value">${manutPend}</div></div>
      <div class="stat-card"><div class="label">Chamados Resolvidos</div><div class="value">${manutRes}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="table-card">
        <div class="table-header"><span class="table-title">Por Status</span></div>
        <div class="table-wrap"><table><thead><tr><th>Status</th><th>Qtd</th><th>%</th></tr></thead><tbody>${statusRows}</tbody></table></div>
      </div>
      <div class="table-card">
        <div class="table-header"><span class="table-title">Por Tipo</span></div>
        <div class="table-wrap"><table><thead><tr><th>Tipo</th><th>Qtd</th></tr></thead><tbody>${tipoRows}</tbody></table></div>
      </div>
    </div>
    <div class="table-card" style="margin-top:20px">
      <div class="table-header">
        <span class="table-title">Resumo por Laboratório</span>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV(${encodeURIComponent(JSON.stringify(labs||[]))}, 'labs.csv')" onclick="exportCSV(${JSON.stringify(labs||[])}, 'labs_resumo.csv')">⬇ CSV</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Lab</th><th>Prédio</th><th>Máquinas</th><th>Disponíveis</th><th>Manutenção</th><th>Softwares</th></tr></thead>
        <tbody>${(labs||[]).map(l=>`<tr><td>${l.numero} · ${l.nome}</td><td>${predioBadge(l.predio||'—',l.predio_cor||'#666')}</td><td class="td-mono">${l.total_maquinas||0}</td><td><span class="badge badge-green">${l.maquinas_ok||0}</span></td><td>${l.em_manutencao>0?`<span class="badge badge-orange">${l.em_manutencao}</span>`:'—'}</td><td class="td-mono">${l.total_softwares||0}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-green" onclick="exportRelatorio()">⬇ Exportar Relatório Completo (CSV)</button>
    </div>
  `);
}

async function exportRelatorio() {
  const { data } = await db.from('equipamentos').select(`tipo,marca,modelo,patrimonio,numero_serie,processador,ram_gb,armazenamento_gb,sistema_operacional,status,observacao,data_aquisicao, laboratorios(numero,nome,predios:predio_id(nome))`);
  const flat = (data||[]).map(e => ({
    tipo:e.tipo, marca:e.marca, modelo:e.modelo, patrimonio:e.patrimonio,
    numero_serie:e.numero_serie, processador:e.processador, ram_gb:e.ram_gb,
    hd_gb:e.armazenamento_gb, so:e.sistema_operacional, status:e.status,
    lab:e.laboratorios?.nome, lab_num:e.laboratorios?.numero,
    predio:e.laboratorios?.predios?.nome, observacao:e.observacao,
    data_aquisicao:e.data_aquisicao
  }));
  exportCSV(flat, `inventario_nati_${new Date().toISOString().split('T')[0]}.csv`);
}
